<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee LIST</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div>
    <div><h1 class="text-center">Danh sach nhan vien 2026</h1></div>
    <div>
        <div>
            <a th:href="@{/employees/add}" class="btn btn-primary">Them nhan vien</a>
        </div>
        <form action="">
            <div class="form-group">
                <label for="">Search</label>
                <input type="text" 
                       class="form-control"  placeholder="Nhap ten nhan vien can tim...">
            </div>
            <button type="submit" class="btn btn-primary">search</button>
        </form>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Avatar</th>
                <th>Status</th>
                <th>Department</th>
                <th colspan="2">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${employees}">
                <td scope="row" th:text="${e.id}"></td>
                <td th:text="${e.name}"></td>
                <td th:text="${e.age}"></td>
                <td>
                    <img th:src="${e.avatar}" alt="avatar" width="70" height="70" style="object-fit: cover; border-radius: 50%;">
                </td>
                <td th:text="${e.status}"></td>
                <td th:text="${e.department.name}"></td>
                <td>
                    <a th:href="@{/employees/edit/{id}(id=${e.id})}"
                    class="btn btn-warning"
                    >Edit</a>
                </td>
                <td>
                    <a th:href="@{/employees/delete/{id}(id=${e.id})}"
                    onclick="return confirm('Are you sure ?');"
                       class="btn btn-danger"
                    >Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
