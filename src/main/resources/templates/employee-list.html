<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee LIST</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
          crossorigin="anonymous">
</head>
<body>

<div class="container mt-4">
    <h1 class="text-center mb-4">Danh sach nhan vien 2026</h1>

    <div class="mb-3">
        <a th:href="@{/employees/add}" class="btn btn-primary">Them nhan vien</a>
        <a th:href="@{/departments}" class="btn btn-secondary">Danh sach phong ban</a>
    </div>

    <form th:action="@{/employees}" method="get" class="mb-3">
        <div class="form-row align-items-center">
            <div class="col-auto">
                <input type="text"
                       name="search"
                       class="form-control"
                       placeholder="Nhap ten nhan vien can tim..."
                       th:value="${search}">
            </div>

            <div class="col-auto">
                <select name="sort" class="form-control">
                    <option value="id,asc" th:selected="${sort == 'id,asc'}">Mac dinh</option>
                    <option value="name,asc" th:selected="${sort == 'name,asc'}">Ten A-Z</option>
                    <option value="name,desc" th:selected="${sort == 'name,desc'}">Ten Z-A</option>
                    <option value="age,asc" th:selected="${sort == 'age,asc'}">Tuoi tang dan</option>
                    <option value="age,desc" th:selected="${sort == 'age,desc'}">Tuoi giam dan</option>
                </select>
            </div>

            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Search</button>
                <a th:href="@{/employees}" class="btn btn-secondary">Reset</a>
            </div>
        </div>
    </form>

    <div th:if="${employees.totalElements == 0}" class="alert alert-warning">
        Khong tim thay nhan vien nao
    </div>

    <table class="table table-bordered table-hover" th:if="${employees.totalElements > 0}">
        <thead class="thead-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Avatar</th>
            <th>Status</th>
            <th>Department</th>
            <th colspan="2">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="e : ${employees.content}">
            <td th:text="${e.id}"></td>
            <td th:text="${e.name}"></td>
            <td th:text="${e.age}"></td>

            <td>
                <img th:if="${e.avatar != null && e.avatar != ''}"
                     th:src="@{'/images/' + ${e.avatar}}"
                     alt="avatar"
                     width="70"
                     height="70"
                     style="object-fit: cover;">

                <span th:unless="${e.avatar != null && e.avatar != ''}">
                    No avatar
                </span>
            </td>

            <td th:text="${e.status}"></td>

            <td th:text="${e.department != null ? e.department.name + ' - ' + e.department.location : 'Chua co phong ban'}"></td>

            <td>
                <a th:href="@{/employees/edit/{id}(id=${e.id})}"
                   class="btn btn-warning">
                    Edit
                </a>
            </td>

            <td>
                <a th:href="@{/employees/delete/{id}(id=${e.id})}"
                   onclick="return confirm('Are you sure ?');"
                   class="btn btn-danger">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <nav aria-label="Page navigation" th:if="${employees.totalPages > 0}">
        <ul class="pagination">

            <li th:class="|page-item ${employees.number == 0 ? 'disabled' : ''}|">
                <a class="page-link"
                   th:href="@{/employees(page=${employees.number - 1}, search=${search}, sort=${sort})}"
                   aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                    <span class="sr-only">Previous</span>
                </a>
            </li>

            <li th:each="p : ${#numbers.sequence(1, employees.totalPages)}"
                th:class="${employees.number + 1 == p ? 'page-item active' : 'page-item'}">

                <a class="page-link"
                   th:href="@{/employees(page=${p - 1}, search=${search}, sort=${sort})}"
                   th:text="${p}">
                </a>
            </li>

            <li th:class="|page-item ${employees.number == employees.totalPages - 1 ? 'disabled' : ''}|">
                <a class="page-link"
                   th:href="@{/employees(page=${employees.number + 1}, search=${search}, sort=${sort})}"
                   aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                    <span class="sr-only">Next</span>
                </a>
            </li>

        </ul>
    </nav>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hTj5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>

</body>
</html>
