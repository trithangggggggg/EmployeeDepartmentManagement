<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Department</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4" th:text="${department.id == null ? 'Add Department' : 'Edit Department'}"></h2>

    <form th:action="@{/departments/save}"
          th:object="${department}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Name</label>
            <input type="text"
                   class="form-control"
                   th:field="*{name}"
                   placeholder="Nhap ten phong ban">
            <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text"
                   class="form-control"
                   th:field="*{location}"
                   placeholder="Nhap dia diem">
            <p class="error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></p>
        </div>

        <button type="submit"
                class="btn btn-primary"
                th:text="${department.id == null ? 'Save' : 'Update'}">
        </button>

        <a th:href="@{/departments}" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
