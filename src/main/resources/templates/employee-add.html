<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Add Employee</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4" th:text="${employee.id == null ? 'Add Employee' : 'Edit Employee'}"></h2>

    <form th:action="@{/employees/save}" th:object="${employee}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{avatar}">

        <div class="form-group">
            <label>Name</label>
            <input type="text"
                   class="form-control"
                   th:field="*{name}"
                   placeholder="Nhap ten nhan vien">
            <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number"
                   class="form-control"
                   th:field="*{age}"
                   placeholder="Nhap tuoi nhan vien">
            <p class="error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></p>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select class="form-control" th:field="*{status}">
                <option value="">-- Chon trang thai --</option>
                <option value="ACTIVE">ACTIVE</option>
                <option value="INACTIVE">INACTIVE</option>
                <option value="ON_LEAVE">ON_LEAVE</option>
            </select>
            <p class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></p>
        </div>

        <div class="form-group">
            <label>Department</label>
            <select class="form-control" th:field="*{departmentId}">
                <option value="">-- Chon phong ban --</option>
                <option th:each="department : ${departments}"
                        th:value="${department.id}"
                        th:text="${department.name + ' - ' + department.location}">
                </option>
            </select>
            <p class="error" th:if="${#fields.hasErrors('departmentId')}" th:errors="*{departmentId}"></p>
        </div>

        <div class="form-group" th:if="${employee.avatar != null && employee.avatar != ''}">
            <label>Current Avatar</label>
            <div>
                <img th:src="@{'/images/' + ${employee.avatar}}"
                     width="90"
                     height="90"
                     style="object-fit: cover; border-radius: 50%;">
            </div>
        </div>

        <div class="form-group">
            <label>Avatar</label>
            <input type="file"
                   class="form-control-file" th:field="*{file}">
        </div>

        <button type="submit"
                class="btn btn-primary"
                th:text="${employee.id == null ? 'Save' : 'Update'}">
        </button>

        <a th:href="@{/employees}" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
